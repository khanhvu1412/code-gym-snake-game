<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - Snake Game</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

<div class="container">

    <h1>🐍 Snake Game</h1>
    <h2>Đăng ký</h2>

    <form id="registerForm" method="post">
        <input type="text" id="regUsername" placeholder="Username" required>
        <div class="password-box">
            <input type="password" id="regPassword" placeholder="Password" required>
            <span class="eye" onclick="togglePassword('regPassword', this)">🙈</span>
        </div>

        <div class="password-box">
            <input type="password" id="confirmPassword" placeholder="Nhập lại Password" required>
            <span class="eye" onclick="togglePassword('confirmPassword', this)">🙈</span>
        </div>

        <button type="submit">Đăng ký</button>
    </form>

    <p>Đã có tài khoản?</p>
    <a href="/login">Đăng nhập</a>

</div>

<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
</body>
</html>
